<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirigiendo a SmartViajes...</title>
    
    <!-- Redirección inmediata con meta refresh (0 segundos) -->
    <meta http-equiv="refresh" content="0; url=../index.html">
    
    <!-- Redirección alternativa con JavaScript (más rápida y confiable) -->
    <script>
        // Redirección inmediata
        window.location.href = "../index.html";
        
        // Fallback por si algo bloquea el JavaScript
        setTimeout(function() {
            if (window.location.href.indexOf("destinos") !== -1) {
                window.location.href = "../index.html";
            }
        }, 100);
    </script>
    
    <style>
        /* Estilo visual mientras redirige (opcional) */
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0b1220 0%, #1a1f2e 100%);
            color: white;
        }
        
        .redirect-container {
            text-align: center;
            padding: 2rem;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 204, 0, 0.2);
            border-top-color: #ffcc00;
            border-radius: 50%;
            margin: 0 auto 1rem;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        a {
            color: #ffcc00;
            text-decoration: none;
        }
        
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="redirect-container">
        <div class="spinner"></div>
        <h2>Redirigiendo a SmartViajes...</h2>
        <p>Si no eres redirigido automáticamente, <a href="../index.html">haz clic aquí</a>.</p>
    </div>
</body>
</html>
